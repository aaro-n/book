# Sonic 搜索引擎配置
# 使用方式: docker-compose 中挂载为 /etc/sonic.cfg

[server]
log_level = "warn"

[channel]
inet = "0.0.0.0:1491"
tcp_timeout = 300

[channel.search]
query_limit_default = 20
query_limit_maximum = 100
query_parser_max_depth = 5

[store]
store_path = "/var/lib/sonic/store/"

# 可选：多 bucket 并发
[store.kv]
retain_word_objects = 1000

# 语言配置
# none: 不做任何处理
# zho: 中文（Sonic 不做分词，只做规范化，分词由 Go 层完成）
[normalization.zho]
# 中文标点符号清理
strip = "！@#￥%…&*（）—+={}|：\"'<>,.?/~`;:!@#$%^&*()_+-=[]{}|\\\"'<>/,./?"
